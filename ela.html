<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELABoost · Writing Coach · Grade 5</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A2240; --red: #CC0000; --gold: #E8A000; --peach: #FF6B47;
    --green: #1A7A4A; --purple: #6D28D9; --bg: #F5F2EE;
    --card: #FFFFFF; --text: #1A1A2E; --muted: #6B7280;
    --border: #E5E0D8; --radius: 18px;
    --shadow: 0 4px 24px rgba(10,34,64,0.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── NAV ── */
  nav { background: var(--navy); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 20px rgba(10,34,64,0.3); }
  .logo { font-family: 'Lora', serif; font-size: 1.4rem; color: white; display: flex; align-items: center; gap: 10px; }
  .logo span { background: var(--red); padding: 3px 9px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .nav-grade { display: flex; gap: 6px; }
  .ng-btn { padding: 6px 14px; border-radius: 18px; border: 2px solid rgba(255,255,255,0.2); font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.8rem; cursor: pointer; background: transparent; color: rgba(255,255,255,0.6); transition: all 0.2s; }
  .ng-btn:hover { border-color: rgba(255,255,255,0.5); color: white; }
  .ng-btn.active { background: var(--red); border-color: var(--red); color: white; }
  .nav-right { display: flex; align-items: center; gap: 8px; }
  .xp-pill { background: var(--gold); color: var(--navy); padding: 5px 12px; border-radius: 18px; font-weight: 800; font-size: 0.8rem; }

  /* ── LAYOUT ── */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 64px); }

  /* ── SIDEBAR ── */
  .sidebar { background: var(--navy); padding: 28px 20px; display: flex; flex-direction: column; gap: 6px; border-right: 1px solid rgba(255,255,255,0.08); }
  .sidebar-title { color: rgba(255,255,255,0.45); font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 4px; margin-top: 12px; }
  .sidebar-title:first-child { margin-top: 0; }
  .lesson-btn { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 12px; border: none; background: transparent; color: rgba(255,255,255,0.6); font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; text-align: left; width: 100%; }
  .lesson-btn:hover { background: rgba(255,255,255,0.08); color: white; }
  .lesson-btn.active { background: rgba(255,255,255,0.12); color: white; }
  .lesson-btn.done { color: rgba(255,255,255,0.5); }
  .lesson-btn .lb-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
  .lesson-btn.active .lb-icon { background: var(--gold); }
  .lesson-btn:not(.active) .lb-icon { background: rgba(255,255,255,0.08); }
  .lesson-btn.done .lb-icon { background: rgba(26,122,74,0.4); }
  .lb-check { margin-left: auto; font-size: 0.8rem; opacity: 0.6; }

  /* ── MAIN ── */
  .main { padding: 36px; overflow-y: auto; max-width: 860px; }

  /* ── LESSON HEADER ── */
  .lesson-header { margin-bottom: 28px; }
  .lh-breadcrumb { color: var(--red); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .lh-title { font-family: 'Lora', serif; font-size: 2rem; color: var(--navy); line-height: 1.2; margin-bottom: 8px; }
  .lh-gse { display: inline-block; background: #FEF3E2; color: #92400E; border: 1px solid #FDE68A; padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
  .lh-desc { color: var(--muted); font-size: 0.92rem; line-height: 1.6; margin-top: 10px; }

  /* ── PROGRESS STEPS ── */
  .steps-bar { display: flex; align-items: center; gap: 0; margin-bottom: 32px; }
  .step-item { display: flex; align-items: center; flex: 1; }
  .step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; flex-shrink: 0; transition: all 0.3s; border: 2px solid var(--border); background: white; color: var(--muted); }
  .step-circle.active { background: var(--navy); border-color: var(--navy); color: white; }
  .step-circle.done { background: var(--green); border-color: var(--green); color: white; }
  .step-line { flex: 1; height: 2px; background: var(--border); transition: background 0.3s; }
  .step-line.done { background: var(--green); }
  .step-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); margin-top: 6px; text-align: center; white-space: nowrap; }
  .step-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; }

  /* ── LESSON CARD ── */
  .lesson-card { background: white; border-radius: var(--radius); border: 2px solid var(--border); overflow: hidden; margin-bottom: 20px; box-shadow: var(--shadow); }
  .lc-header { padding: 18px 24px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .lc-step-badge { background: var(--navy); color: white; padding: 4px 12px; border-radius: 18px; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
  .lc-title { font-family: 'Lora', serif; font-size: 1.1rem; color: var(--navy); }
  .lc-body { padding: 24px; }

  /* ── LEARN BOX ── */
  .learn-box { background: #F0F4FF; border-left: 4px solid var(--navy); border-radius: 0 12px 12px 0; padding: 18px 22px; margin-bottom: 20px; }
  .learn-box h4 { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--navy); margin-bottom: 8px; }
  .learn-box p { font-size: 0.92rem; line-height: 1.7; color: var(--text); }
  .learn-box .example { background: white; border-radius: 10px; padding: 12px 16px; margin-top: 12px; font-family: 'Lora', serif; font-size: 0.95rem; font-style: italic; color: var(--navy); border: 1px solid var(--border); }
  .learn-box .bad-example { background: #FEF2F2; border-radius: 10px; padding: 12px 16px; margin-top: 8px; font-family: 'Lora', serif; font-size: 0.95rem; font-style: italic; color: #991B1B; border: 1px solid #FECACA; }
  .ex-label { font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

  /* ── SENTENCE BUILDER ── */
  .drag-zone { margin-bottom: 20px; }
  .drag-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .word-bank { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px; background: #F9F7F4; border-radius: 12px; border: 2px dashed var(--border); min-height: 60px; }
  .word-chip { padding: 7px 14px; background: white; border: 2px solid var(--border); border-radius: 20px; font-weight: 700; font-size: 0.88rem; cursor: grab; transition: all 0.2s; user-select: none; }
  .word-chip:hover { border-color: var(--navy); color: var(--navy); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(10,34,64,0.12); }
  .word-chip.dragging { opacity: 0.4; }
  .word-chip.placed { opacity: 0.35; cursor: not-allowed; }
  .drop-zone { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px; background: white; border-radius: 12px; border: 2px solid var(--border); min-height: 60px; transition: all 0.2s; }
  .drop-zone.over { border-color: var(--navy); background: #EFF3FA; }
  .placed-chip { padding: 7px 14px; background: var(--navy); color: white; border-radius: 20px; font-weight: 700; font-size: 0.88rem; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
  .placed-chip:hover { background: var(--red); }
  .placed-chip .remove { font-size: 0.75rem; opacity: 0.7; }
  .drop-placeholder { color: var(--muted); font-size: 0.88rem; font-style: italic; padding: 4px 0; }

  .check-sentence-btn { padding: 10px 22px; background: var(--navy); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; margin-top: 12px; }
  .check-sentence-btn:hover { background: #0D2E5A; transform: translateY(-1px); }

  .sentence-result { margin-top: 12px; padding: 14px 18px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; display: none; }
  .sentence-result.show { display: block; }
  .sentence-result.ok { background: #F0FDF4; border: 2px solid #86EFAC; color: #14532D; }
  .sentence-result.no { background: #FEF2F2; border: 2px solid #FECACA; color: #7F1D1D; }

  /* ── WRITING AREA ── */
  .writing-prompt { background: #FFFBF0; border: 2px solid #FDE68A; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
  .writing-prompt .wp-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gold); margin-bottom: 6px; }
  .writing-prompt p { font-family: 'Lora', serif; font-size: 1rem; color: var(--navy); line-height: 1.6; }

  .hint-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .hint-chip { padding: 5px 12px; background: #EFF3FA; border: 1px solid #BFDBFE; border-radius: 18px; font-size: 0.78rem; font-weight: 600; color: var(--navy); cursor: pointer; transition: all 0.2s; }
  .hint-chip:hover { background: var(--navy); color: white; }

  .writing-input { width: 100%; padding: 16px 18px; border: 2px solid var(--border); border-radius: 14px; font-family: 'Lora', serif; font-size: 1rem; line-height: 1.7; resize: vertical; min-height: 120px; transition: border-color 0.2s; color: var(--text); background: white; }
  .writing-input:focus { outline: none; border-color: var(--navy); }
  .writing-input::placeholder { color: var(--muted); font-style: italic; }
  .word-count { font-size: 0.75rem; color: var(--muted); font-weight: 600; margin-top: 6px; text-align: right; }

  /* ── AI FEEDBACK BOX ── */
  .ai-feedback { background: var(--navy); border-radius: var(--radius); padding: 24px; margin-top: 16px; display: none; animation: fadeIn 0.4s ease; }
  .ai-feedback.show { display: block; }
  .ai-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .ai-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .ai-title { color: white; font-weight: 800; font-size: 0.92rem; }
  .ai-subtitle { color: rgba(255,255,255,0.5); font-size: 0.75rem; }
  .ai-score-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .ai-score-item { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; flex: 1; min-width: 100px; }
  .ai-score-item .sc-val { font-family: 'Lora', serif; font-size: 1.5rem; font-weight: 700; }
  .ai-score-item .sc-lbl { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .ai-text { color: rgba(255,255,255,0.85); font-size: 0.9rem; line-height: 1.75; }
  .ai-text strong { color: var(--gold); }
  .ai-loading { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7); font-size: 0.9rem; }
  .ai-dots { display: flex; gap: 4px; }
  .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: bounce 1.2s infinite; }
  .ai-dot:nth-child(2) { animation-delay: 0.2s; }
  .ai-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.5} 40%{transform:scale(1);opacity:1} }

  .highlighted-text { line-height: 2; font-family: 'Lora', serif; font-size: 0.95rem; color: rgba(255,255,255,0.85); margin-top: 14px; padding: 14px 16px; background: rgba(255,255,255,0.06); border-radius: 10px; }
  .hl-good { background: rgba(26,122,74,0.35); border-radius: 4px; padding: 1px 3px; }
  .hl-improve { background: rgba(232,160,0,0.3); border-radius: 4px; padding: 1px 3px; }
  .hl-fix { background: rgba(204,0,0,0.3); border-radius: 4px; padding: 1px 3px; text-decoration: underline; text-decoration-color: rgba(204,0,0,0.7); }

  /* ── BUTTONS ── */
  .action-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn-primary { padding: 13px 26px; background: var(--navy); color: white; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: 0.93rem; cursor: pointer; transition: all 0.2s; }
  .btn-primary:hover { background: #0D2E5A; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(10,34,64,0.25); }
  .btn-secondary { padding: 13px 22px; background: white; color: var(--navy); border: 2px solid var(--border); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; }
  .btn-secondary:hover { border-color: var(--navy); }
  .btn-ai { padding: 13px 22px; background: linear-gradient(135deg, #1A7A4A, #059669); color: white; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
  .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,122,74,0.35); }
  .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── GRAMMAR QUIZ ── */
  .grammar-item { background: white; border: 2px solid var(--border); border-radius: 14px; padding: 20px 22px; margin-bottom: 14px; }
  .gi-sentence { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.7; margin-bottom: 14px; color: var(--navy); }
  .gi-options { display: flex; flex-wrap: wrap; gap: 8px; }
  .gi-opt { padding: 8px 16px; background: #F9F7F4; border: 2px solid var(--border); border-radius: 20px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; }
  .gi-opt:hover:not(:disabled) { border-color: var(--navy); background: #EFF3FA; color: var(--navy); }
  .gi-opt.correct { border-color: var(--green); background: #F0FDF4; color: #14532D; }
  .gi-opt.wrong { border-color: var(--red); background: #FEF2F2; color: #7F1D1D; }
  .gi-opt:disabled { cursor: not-allowed; }
  .gi-explain { margin-top: 12px; padding: 12px 16px; background: #F0F4FF; border-radius: 10px; font-size: 0.85rem; line-height: 1.6; color: var(--text); display: none; }
  .gi-explain.show { display: block; }

  /* ── COMPLETION ── */
  .completion-card { background: var(--navy); border-radius: var(--radius); padding: 40px; text-align: center; color: white; }
  .completion-card h2 { font-family: 'Lora', serif; font-size: 2rem; margin-bottom: 10px; }
  .completion-card p { color: rgba(255,255,255,0.7); margin-bottom: 24px; }
  .xp-gained { font-family: 'Lora', serif; font-size: 3rem; color: var(--gold); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  @media(max-width:768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 18px; }
    .ai-score-row { flex-direction: column; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">✍️ Writing Coach <span>GSE</span></div>
  <div class="nav-grade">
    <button class="ng-btn active" onclick="setGrade(5)">Gr.5</button>
    <button class="ng-btn" onclick="setGrade(6)">Gr.6</button>
    <button class="ng-btn" onclick="setGrade(7)">Gr.7</button>
    <button class="ng-btn" onclick="setGrade(8)">Gr.8</button>
    <button class="ng-btn" onclick="setGrade(9)">Gr.9</button>
  </div>
  <div class="nav-right">
    <div class="xp-pill">⭐ <span id="xpCount">0</span> XP</div>
  </div>
</nav>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">Sentence Building</div>
    <button class="lesson-btn active" onclick="loadLesson('sentence1')">
      <div class="lb-icon">🔧</div> Subject & Predicate
    </button>
    <button class="lesson-btn" onclick="loadLesson('sentence2')">
      <div class="lb-icon">🔗</div> Compound Sentences
    </button>
    <button class="lesson-btn" onclick="loadLesson('sentence3')">
      <div class="lb-icon">🌿</div> Complex Sentences
    </button>

    <div class="sidebar-title">Paragraph Structure</div>
    <button class="lesson-btn" onclick="loadLesson('para1')">
      <div class="lb-icon">🎯</div> Topic Sentences
    </button>
    <button class="lesson-btn" onclick="loadLesson('para2')">
      <div class="lb-icon">📋</div> Supporting Details
    </button>
    <button class="lesson-btn" onclick="loadLesson('para3')">
      <div class="lb-icon">🔚</div> Concluding Sentences
    </button>

    <div class="sidebar-title">Grammar & Mechanics</div>
    <button class="lesson-btn" onclick="loadLesson('gram1')">
      <div class="lb-icon">🔤</div> Punctuation
    </button>
    <button class="lesson-btn" onclick="loadLesson('gram2')">
      <div class="lb-icon">⏰</div> Verb Tense
    </button>
    <button class="lesson-btn" onclick="loadLesson('gram3')">
      <div class="lb-icon">🔄</div> Transitions
    </button>

    <div class="sidebar-title">Reading Literature</div>
    <button class="lesson-btn" onclick="loadLesson('rl5')">
      <div class="lb-icon">📐</div> Story Structure
    </button>

    <div class="sidebar-title">Reading Informational</div>
    <button class="lesson-btn" onclick="loadLesson('ri4')">
      <div class="lb-icon">🔍</div> Word Meaning
    </button>
    <button class="lesson-btn" onclick="loadLesson('ri6')">
      <div class="lb-icon">👁️</div> Author's Point of View
    </button>
    <button class="lesson-btn" onclick="loadLesson('ri7')">
      <div class="lb-icon">📊</div> Text Features
    </button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="mainContent"></div>
</div>

<script>
// ══════════════════════════════════════════
// LESSON DATA
// ══════════════════════════════════════════
const LESSONS = {

  sentence1: {
    title: "Subject & Predicate",
    breadcrumb: "Sentence Building · Step 1 of 3",
    gse: "ELAGSE5L.1 — Demonstrate command of English grammar",
    desc: "Every complete sentence needs two parts: a subject (who or what the sentence is about) and a predicate (what the subject does or is). Mastering this is the first step to powerful writing!",
    steps: ["Learn", "Build", "Write", "AI Review"],
    type: "sentence_builder",
    learn: {
      rule: "The <strong>subject</strong> tells who or what the sentence is about. The <strong>predicate</strong> tells what the subject does, is, or has. Without both parts, a sentence is a fragment — an incomplete thought.",
      good: "✅ The red-tailed hawk / soars above the Georgia pines.",
      bad: "❌ Soars above the Georgia pines. (No subject — who is doing this?)"
    },
    drag: {
      prompt: "Arrange these words to build a complete sentence:",
      words: ["The", "river", "otter", "slides", "into", "the", "cold", "stream"],
      correct: ["The", "river", "otter", "slides", "into", "the", "cold", "stream"],
      explanation: "Subject: 'The river otter' · Predicate: 'slides into the cold stream' — a complete thought!"
    },
    write: {
      prompt: "Write 2 complete sentences about an animal you find interesting. Make sure each sentence has a clear subject and predicate.",
      placeholder: "Example: The monarch butterfly migrates thousands of miles each fall. It follows the same path as its ancestors did before it...",
      hints: ["The dolphin...", "A bald eagle...", "My dog...", "Wild horses..."],
      minWords: 15
    }
  },

  sentence2: {
    title: "Compound Sentences",
    breadcrumb: "Sentence Building · Step 2 of 3",
    gse: "ELAGSE5L.1 — Use coordinating conjunctions correctly",
    desc: "Compound sentences join two complete ideas using FANBOYS conjunctions (For, And, Nor, But, Or, Yet, So). They make your writing flow more smoothly and show how ideas connect.",
    steps: ["Learn", "Build", "Write", "AI Review"],
    type: "sentence_builder",
    learn: {
      rule: "Use a <strong>coordinating conjunction</strong> (FANBOYS) with a <strong>comma</strong> to join two independent clauses. Each part must be able to stand alone as its own sentence. Put the comma BEFORE the conjunction.",
      good: "✅ The peach crop was small this year, but the farmers worked hard.",
      bad: "❌ The peach crop was small this year but the farmers worked hard. (Missing comma before 'but')"
    },
    drag: {
      prompt: "Rearrange to form a correct compound sentence:",
      words: ["Joshua", "finished", "his", "homework", ",", "so", "he", "played", "outside"],
      correct: ["Joshua", "finished", "his", "homework", ",", "so", "he", "played", "outside"],
      explanation: "Two independent clauses joined by ', so' — cause and effect shown with a coordinating conjunction and comma."
    },
    write: {
      prompt: "Write 2 compound sentences using different FANBOYS conjunctions. One should use 'but' and one should use 'so' or 'and.'",
      placeholder: "Example: I wanted to stay inside, but my friends convinced me to play. The rain stopped early, so we went to the park after all...",
      hints: ["I love reading, but...", "The test was hard, and...", "She wanted pizza, yet...", "We studied, so..."],
      minWords: 20
    }
  },

  sentence3: {
    title: "Complex Sentences",
    breadcrumb: "Sentence Building · Step 3 of 3",

      prompt: "Think about an informational book or article you've read that had text features (diagrams, charts, maps, photos with captions, or headings). Write 3-4 sentences describing ONE specific text feature and explain what information it showed that the words in the article did NOT or COULD NOT show as clearly.",
      placeholder: "In [book/article], the [text feature] showed... This was more effective than the words alone because... Without this feature, readers would not understand...",
      hints: ["The diagram showed how...", "The graph made it easy to compare...", "The map helped readers understand where...", "The caption explained something the photo couldn't show by itself..."],
      minWords: 40
    }
  }
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let currentLesson = 'sentence1';
let currentGrade = 5;
let currentStep = 0;
let xp = 0;
let draggedWord = null;
let placedWords = [];

const GRADE_PREFIXES = {5:'ELAGSE5',6:'ELAGSE6',7:'ELAGSE7',8:'ELAGSE8',9:'ELAGSE9-10'};

// ══════════════════════════════════════════
// GRADE
// ══════════════════════════════════════════
function setGrade(g) {
  currentGrade = g;
  document.querySelectorAll('.ng-btn').forEach((b,i) => b.classList.toggle('active', i === g-5));
  loadLesson(currentLesson);
}

// ══════════════════════════════════════════
// LESSON LOADER
// ══════════════════════════════════════════
function loadLesson(id) {
  currentLesson = id;
  currentStep = 0;
  placedWords = [];

  document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.lesson-btn');
  const lessonKeys = Object.keys(LESSONS);
  const idx = lessonKeys.indexOf(id);
  if(btns[idx]) btns[idx].classList.add('active');

  renderStep();
}

// ══════════════════════════════════════════
// STEP RENDERER
// ══════════════════════════════════════════
function renderStep() {
  const L = LESSONS[currentLesson];
  const main = document.getElementById('mainContent');

  // Build steps bar HTML
  const stepsHtml = L.steps.map((s,i) => {
    const cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    const icon = i < currentStep ? '✓' : i+1;
    return `<div class="step-wrapper">
      <div style="display:flex;align-items:center;width:100%;">
        <div class="step-circle ${cls}">${icon}</div>
        ${i < L.steps.length-1 ? `<div class="step-line ${i < currentStep ? 'done' : ''}"></div>` : ''}
      </div>
      <div class="step-label" style="color:${i===currentStep?'var(--navy)':''};font-weight:${i===currentStep?'800':'600'}">${s}</div>
    </div>`;
  }).join('');

  // Determine content based on step
  let content = '';

  if(currentStep === 0) {
    // LEARN STEP
    content = `
      <div class="lesson-card">
        <div class="lc-header">
          <div class="lc-step-badge">📖 Learn</div>
          <div class="lc-title">The Rule</div>
        </div>
        <div class="lc-body">
          <div class="learn-box">
            <h4>💡 Key Concept</h4>
            <p>${L.learn.rule}</p>
            <div class="ex-label" style="color:var(--green);margin-top:14px;">Strong example</div>
            <div class="example">${L.learn.good}</div>
            <div class="ex-label" style="color:var(--red);margin-top:10px;">Weak example — avoid this</div>
            <div class="bad-example">${L.learn.bad}</div>
          </div>
          <div class="action-row">
            <button class="btn-primary" onclick="advanceStep()">I understand — let's practice! →</button>
          </div>
        </div>
      </div>`;

  } else if(currentStep === 1) {
    // PRACTICE STEP (drag/grammar/identify)
    if(L.type === 'sentence_builder' && L.drag) {
      content = buildDragStep(L);
    } else if(L.type === 'grammar' && L.grammar) {
      content = buildGrammarStep(L);
    } else {
      // paragraph lessons — show identify exercise
      content = buildIdentifyStep(L);
    }

  } else if(currentStep === 2) {
    // WRITE STEP
    content = buildWriteStep(L);

  } else if(currentStep === 3) {
    // COMPLETION
    content = buildCompletionStep(L);
  }

  main.innerHTML = `
    <div class="lesson-header">
      <div class="lh-breadcrumb">${L.breadcrumb}</div>
      <h1 class="lh-title">${L.title}</h1>
      <div class="lh-gse">${L.gse}</div>
      <p class="lh-desc">${L.desc}</p>
    </div>
    <div class="steps-bar">${stepsHtml}</div>
    ${content}`;

  // Re-attach drag events if needed
  if(L.type === 'sentence_builder' && L.drag && currentStep === 1) {
    setupDrag();
  }
}

// ══════════════════════════════════════════
// DRAG & DROP STEP
// ══════════════════════════════════════════
function buildDragStep(L) {
  const chips = L.drag.words.map((w,i) =>
    `<div class="word-chip" draggable="true" id="chip-${i}" data-word="${w}" data-idx="${i}">${w}</div>`
  ).join('');

  return `
    <div class="lesson-card">
      <div class="lc-header">
        <div class="lc-step-badge">🔧 Build</div>
        <div class="lc-title">Sentence Builder</div>
      </div>
      <div class="lc-body">
        <div class="drag-zone">
          <div class="drag-label">Word Bank — drag words into the sentence</div>
          <div class="word-bank" id="wordBank">${chips}</div>
        </div>
        <div class="drag-zone">
          <div class="drag-label">Build your sentence here</div>
          <div class="drop-zone" id="dropZone">
            <span class="drop-placeholder" id="dropPlaceholder">Drop words here to build your sentence...</span>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;">
          <button class="check-sentence-btn" onclick="checkSentence()">✓ Check My Sentence</button>
          <button class="btn-secondary" onclick="clearSentence()" style="padding:10px 18px;font-size:0.85rem;">Reset ↺</button>
        </div>
        <div class="sentence-result" id="sentenceResult"></div>
      </div>
    </div>`;
}

function setupDrag() {
  const L = LESSONS[currentLesson];
  placedWords = [];

  document.querySelectorAll('.word-chip').forEach(chip => {
    chip.addEventListener('dragstart', e => {
      draggedWord = { word: chip.dataset.word, idx: chip.dataset.idx };
      chip.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
  });

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    if(!draggedWord) return;

    const chip = document.getElementById(`chip-${draggedWord.idx}`);
    if(chip && !chip.classList.contains('placed')) {
      chip.classList.add('placed');
      placedWords.push({ word: draggedWord.word, idx: draggedWord.idx });
      renderDropped();
    }
    draggedWord = null;
  });
}

function renderDropped() {
  const dz = document.getElementById('dropZone');
  const ph = document.getElementById('dropPlaceholder');
  if(ph) ph.style.display = placedWords.length ? 'none' : 'block';

  // Remove existing placed chips
  dz.querySelectorAll('.placed-chip').forEach(c => c.remove());
  placedWords.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'placed-chip';
    el.innerHTML = `${item.word} <span class="remove">✕</span>`;
    el.onclick = () => removePlaced(i);
    dz.appendChild(el);
  });
}

function removePlaced(idx) {
  const item = placedWords[idx];
  placedWords.splice(idx, 1);
  const chip = document.getElementById(`chip-${item.idx}`);
  if(chip) chip.classList.remove('placed');
  renderDropped();
}

function clearSentence() {
  placedWords = [];
  document.querySelectorAll('.word-chip').forEach(c => c.classList.remove('placed'));
  renderDropped();
  const r = document.getElementById('sentenceResult');
  if(r) r.className = 'sentence-result';
}

function checkSentence() {
  const L = LESSONS[currentLesson];
  const result = document.getElementById('sentenceResult');
  const built = placedWords.map(p => p.word).join(' ');
  const correct = L.drag.correct.join(' ');

  if(built.toLowerCase() === correct.toLowerCase()) {
    result.className = 'sentence-result show ok';
    result.innerHTML = `✅ <strong>Perfect!</strong> ${L.drag.explanation}`;
    addXP(20);
    setTimeout(() => advanceStep(), 1800);
  } else if(built.length === 0) {
    result.className = 'sentence-result show no';
    result.innerHTML = `⚠️ Please drag some words into the sentence first!`;
  } else {
    result.className = 'sentence-result show no';
    result.innerHTML = `💡 <strong>Not quite!</strong> Check your word order. Hint: Start with the subject.`;
  }
}

// ══════════════════════════════════════════
// GRAMMAR STEP
// ══════════════════════════════════════════
function buildGrammarStep(L) {
  const items = L.grammar.map((q,i) => `
    <div class="grammar-item" id="gi-${i}">
      <div class="gi-sentence">${q.q}</div>
      <div class="gi-options">
        ${q.opts.map((o,j) => `<button class="gi-opt" onclick="checkGrammar(${i},${j})" id="go-${i}-${j}">${o}</button>`).join('')}
      </div>
      <div class="gi-explain" id="ge-${i}">${q.exp}</div>
    </div>`).join('');

  return `
    <div class="lesson-card">
      <div class="lc-header">
        <div class="lc-step-badge">🔧 Fix It</div>
        <div class="lc-title">Grammar Practice</div>
      </div>
      <div class="lc-body">
        <p style="color:var(--muted);font-size:0.88rem;margin-bottom:18px;">Answer all 3 questions to continue to the writing step.</p>
        ${items}
        <div id="grammarNext" style="display:none;margin-top:4px;">
          <div class="action-row"><button class="btn-primary" onclick="advanceStep()">Great! Now let's write →</button></div>
        </div>
      </div>
    </div>`;
}

let grammarScores = {};
function checkGrammar(qIdx, optIdx) {
  const L = LESSONS[currentLesson];
  const q = L.grammar[qIdx];
  const opts = document.querySelectorAll(`[id^="go-${qIdx}-"]`);
  opts.forEach(o => o.disabled = true);
  opts[q.ans].classList.add('correct');
  if(optIdx !== q.ans) opts[optIdx].classList.add('wrong');
  document.getElementById(`ge-${qIdx}`).classList.add('show');

  grammarScores[qIdx] = optIdx === q.ans;
  if(optIdx === q.ans) addXP(10);

  if(Object.keys(grammarScores).length >= L.grammar.length) {
    document.getElementById('grammarNext').style.display = 'block';
  }
}

// ══════════════════════════════════════════
// IDENTIFY STEP (paragraph lessons)
// ══════════════════════════════════════════
function buildIdentifyStep(L) {
  return `
    <div class="lesson-card">
      <div class="lc-header">
        <div class="lc-step-badge">🔍 Identify</div>
        <div class="lc-title">Spot the Difference</div>
      </div>
      <div class="lc-body">
        <p style="color:var(--muted);font-size:0.88rem;margin-bottom:18px;">Read the examples below. Which one follows the rule you just learned?</p>

            <h4>Option A</h4>

          <div class="learn-box" style="cursor:pointer;background:#FFF0EE;border-left-color:var(--red);transition:all 0.2s;" onclick="identifyChoice('B',false)" id="choiceB">
            <h4>Option B</h4>

          </div>

      </div>
    </div>`;
}

function identifyChoice(choice, correct) {
  const result = document.getElementById('identifyResult');
  result.style.display = 'block';
  if(correct) {
    result.innerHTML = `<div style="background:#F0FDF4;border:2px solid #86EFAC;border-radius:12px;padding:16px;color:#14532D;font-weight:700;">🎉 Correct! Option A follows the rule. <button class="btn-primary" style="margin-left:12px;padding:8px 18px;font-size:0.83rem;" onclick="advanceStep()">Continue →</button></div>`;
    addXP(15);
  } else {
    result.innerHTML = `<div style="background:#FEF2F2;border:2px solid #FECACA;border-radius:12px;padding:16px;color:#7F1D1D;font-weight:700;">💡 Not quite — Option A is correct. <button class="btn-primary" style="margin-left:12px;padding:8px 18px;font-size:0.83rem;" onclick="advanceStep()">Continue →</button></div>`;
  }
}

// ══════════════════════════════════════════
// WRITE STEP
// ══════════════════════════════════════════
function buildWriteStep(L) {
  const hints = L.write.hints.map(h =>
    `<div class="hint-chip" onclick="insertHint('${h}')">${h}</div>`
  ).join('');

  return `
    <div class="lesson-card">
      <div class="lc-header">
        <div class="lc-step-badge">✍️ Write</div>
        <div class="lc-title">Your Turn</div>
      </div>
      <div class="lc-body">
        <div class="writing-prompt">
          <div class="wp-label">📋 Your Writing Prompt</div>
          <p>${L.write.prompt}</p>
        </div>
        <div class="drag-label">💡 Starter phrases — click to insert</div>
        <div class="hint-chips">${hints}</div>
        <textarea class="writing-input" id="writingInput" placeholder="${L.write.placeholder}" oninput="updateWordCount()" rows="6"></textarea>
        <div class="word-count" id="wordCount">0 words · Goal: ${L.write.minWords}+ words</div>
        <div class="action-row">
          <button class="btn-ai" id="aiFeedbackBtn" onclick="getAIFeedback()">
            🤖 Get AI Feedback
          </button>
          <button class="btn-secondary" onclick="clearWriting()">Clear ↺</button>
        </div>
        <div class="ai-feedback" id="aiFeedbackBox"></div>
        <div class="action-row" id="nextAfterWrite" style="display:none;">
          <button class="btn-primary" onclick="advanceStep()">Complete Lesson ✓</button>
        </div>
      </div>
    </div>`;
}

function insertHint(text) {
  const ta = document.getElementById('writingInput');
  if(!ta) return;
  const pos = ta.selectionStart;
  const current = ta.value;
  ta.value = current.slice(0, pos) + text + ' ' + current.slice(pos);
  ta.focus();
  updateWordCount();
}

function updateWordCount() {
  const ta = document.getElementById('writingInput');
  const wc = document.getElementById('wordCount');
  const L = LESSONS[currentLesson];
  if(!ta || !wc) return;
  const words = ta.value.trim().split(/\s+/).filter(w => w.length > 0).length;
  const goal = L.write.minWords;
  const pct = Math.min(100, Math.round(words/goal*100));
  wc.textContent = `${words} words · Goal: ${goal}+ words`;
  wc.style.color = words >= goal ? 'var(--green)' : 'var(--muted)';
}

function clearWriting() {
  const ta = document.getElementById('writingInput');
  if(ta) ta.value = '';
  updateWordCount();
  const fb = document.getElementById('aiFeedbackBox');
  if(fb) fb.className = 'ai-feedback';
}

// ══════════════════════════════════════════
// COMPLETION STEP
// ══════════════════════════════════════════
function buildCompletionStep(L) {
  const lessons = Object.keys(LESSONS);
  const idx = lessons.indexOf(currentLesson);
  const nextId = idx < lessons.length - 1 ? lessons[idx+1] : null;
  const nextLesson = nextId ? LESSONS[nextId] : null;

  // Mark sidebar button as done
  const btns = document.querySelectorAll('.lesson-btn');
  if(btns[idx]) {
    btns[idx].classList.remove('active');
    btns[idx].classList.add('done');
    btns[idx].querySelector('.lb-icon').textContent = '✓';
    if(!btns[idx].querySelector('.lb-check')) {
      const check = document.createElement('span');
      check.className = 'lb-check'; check.textContent = '✓';
      btns[idx].appendChild(check);
    }
  }

  return `
    <div class="completion-card">
      <div style="font-size:3.5rem;margin-bottom:16px;">🏆</div>
      <h2>Lesson Complete!</h2>
      <p>You mastered <strong style="color:var(--gold);">${L.title}</strong></p>
      <div class="xp-gained">+50 XP</div>
      <p style="color:rgba(255,255,255,0.5);font-size:0.8rem;margin-top:4px;">added to your total</p>
      ${nextLesson ? `
        <div style="margin-top:28px;background:rgba(255,255,255,0.08);border-radius:14px;padding:20px;">
          <div style="color:rgba(255,255,255,0.5);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Up Next</div>
          <div style="color:white;font-family:'Lora',serif;font-size:1.1rem;margin-bottom:14px;">${nextLesson.title}</div>
          <button class="btn-secondary" style="background:transparent;border-color:rgba(255,255,255,0.3);color:white;" onclick="loadLesson('${nextId}')">Start Next Lesson →</button>
        </div>` : `<p style="color:rgba(255,255,255,0.6);margin-top:20px;">You've completed all writing lessons! 🎉</p>`}
      <div style="margin-top:16px;">
        <button class="btn-secondary" style="background:transparent;border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);" onclick="loadLesson('${currentLesson}')">Redo This Lesson ↺</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function advanceStep() {
  const L = LESSONS[currentLesson];
  grammarScores = {};
  if(currentStep < L.steps.length - 1) {
    currentStep++;
    renderStep();
  }
}

function addXP(amount) {
  xp += amount;
  const el = document.getElementById('xpCount');
  if(el) el.textContent = xp;
}
