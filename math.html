<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELABoost Math — Fractions Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#4FACFE; --sun:#FFD43B; --green:#51CF66; --red:#FF6B6B;
  --purple:#9775FA; --orange:#FF922B; --pink:#F06595; --teal:#20C997;
  --navy:#1a1a2e; --card:#fff; --bg:#F0F9FF;
  --r:20px; --shadow:0 8px 32px rgba(0,0,0,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}

/* STARS BG */
body::before{
  content:'';position:fixed;inset:0;
  background:linear-gradient(160deg,#e0f4ff 0%,#f0e8ff 50%,#fff8e1 100%);
  z-index:-2;
}

/* NAV */
nav{
  background:var(--navy);padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
}
.logo{font-family:'Fredoka One',cursive;color:white;font-size:1.4rem;display:flex;align-items:center;gap:8px;}
.logo-badge{background:var(--sun);color:var(--navy);padding:2px 10px;border-radius:20px;font-size:.8rem;}
.nav-xp{display:flex;align-items:center;gap:8px;color:white;}
.xp-bar{width:120px;height:10px;background:rgba(255,255,255,.2);border-radius:5px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--sun),var(--orange));border-radius:5px;transition:width .5s;}
.xp-txt{font-size:.8rem;font-weight:800;color:var(--sun);}
.stars-count{font-size:.9rem;font-weight:800;color:var(--sun);}

/* LAYOUT */
.app{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 58px);}

/* SIDEBAR */
.sidebar{background:white;border-right:3px solid #E8F4FF;padding:16px 12px;overflow-y:auto;}
.sb-title{font-family:'Fredoka One',cursive;color:var(--navy);font-size:1rem;padding:0 8px;margin-bottom:12px;}
.lesson-btn{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:14px;border:none;background:transparent;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;
  cursor:pointer;transition:all .2s;text-align:left;width:100%;
  color:#555;margin-bottom:4px;
}
.lesson-btn:hover{background:#F0F9FF;color:var(--navy);}
.lesson-btn.active{background:linear-gradient(135deg,#4FACFE,#9775FA);color:white;transform:scale(1.02);}
.lesson-btn.locked{opacity:.4;cursor:not-allowed;}
.lesson-btn.done{color:var(--green);}
.lb-emoji{font-size:1.1rem;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;}
.lesson-btn.active .lb-emoji{background:rgba(255,255,255,.25);}
.lesson-btn:not(.active) .lb-emoji{background:#F5F5F5;}
.lb-info{flex:1;}
.lb-name{display:block;}
.lb-std{font-size:.68rem;font-weight:600;opacity:.6;}
.lock-icon{font-size:.8rem;margin-left:auto;}

.sb-stars{
  margin-top:16px;padding:14px;background:linear-gradient(135deg,#fff8e1,#fff3cd);
  border-radius:16px;border:2px solid var(--sun);text-align:center;
}
.sb-stars-title{font-family:'Fredoka One',cursive;color:var(--orange);font-size:.9rem;}
.sb-stars-val{font-size:2rem;margin:4px 0;}
.sb-stars-sub{font-size:.72rem;color:#888;font-weight:700;}

/* MAIN */
.main{padding:24px;overflow-y:auto;}

/* LESSON HEADER */
.lesson-header{
  background:linear-gradient(135deg,var(--sky),var(--purple));
  border-radius:24px;padding:24px 28px;margin-bottom:20px;
  display:flex;align-items:center;gap:20px;
  box-shadow:0 8px 32px rgba(79,172,254,.3);
  position:relative;overflow:hidden;
}
.lesson-header::before{
  content:'';position:absolute;right:-20px;top:-20px;
  width:140px;height:140px;border-radius:50%;
  background:rgba(255,255,255,.1);
}
.lesson-header::after{
  content:'';position:absolute;right:40px;bottom:-30px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.lh-emoji{font-size:3.5rem;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15));position:relative;z-index:1;}
.lh-text{position:relative;z-index:1;}
.lh-tag{background:rgba(255,255,255,.25);color:white;font-size:.68rem;font-weight:800;
  text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:6px;}
.lh-title{font-family:'Fredoka One',cursive;color:white;font-size:1.8rem;line-height:1.1;}
.lh-sub{color:rgba(255,255,255,.8);font-size:.85rem;font-weight:700;margin-top:4px;}
.lh-progress{margin-left:auto;position:relative;z-index:1;text-align:center;}
.progress-ring{position:relative;width:70px;height:70px;}
.progress-ring svg{transform:rotate(-90deg);}
.progress-ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:1.1rem;color:white;}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:18px;}
.tab-btn{
  padding:10px 20px;border-radius:50px;border:2px solid #E0E0E0;
  background:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;
  cursor:pointer;transition:all .2s;color:#888;
}
.tab-btn:hover{border-color:var(--sky);color:var(--sky);}
.tab-btn.active{background:var(--navy);border-color:var(--navy);color:white;}

/* CONTENT PANELS */
.panel{display:none;}
.panel.active{display:block;}

/* ── LEARN PANEL ── */
.concept-card{
  background:white;border-radius:24px;padding:24px;margin-bottom:16px;
  box-shadow:var(--shadow);border:3px solid transparent;
  transition:all .3s;
}
.concept-card:hover{border-color:var(--sky);transform:translateY(-2px);}
.cc-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.cc-num{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--sky),var(--purple));
  display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;color:white;font-size:1.1rem;}
.cc-title{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--navy);}
.cc-std{font-size:.7rem;font-weight:700;color:#999;margin-left:auto;background:#F5F5F5;padding:3px 8px;border-radius:8px;}

/* VISUAL FRACTION */
.fraction-visual{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin:16px 0;}
.pizza-wrap{text-align:center;}
.pizza-label{font-size:.75rem;font-weight:800;color:#888;margin-bottom:6px;}
.pizza{width:80px;height:80px;position:relative;}
.pizza svg{width:100%;height:100%;}
.fraction-display{
  background:linear-gradient(135deg,#F0F9FF,#E8F4FF);
  border-radius:16px;padding:16px 20px;text-align:center;border:2px solid #BFDBFE;
}
.frac{display:inline-flex;flex-direction:column;align-items:center;font-family:'Fredoka One',cursive;}
.frac-num{font-size:1.8rem;color:var(--sky);line-height:1;}
.frac-bar{width:40px;height:3px;background:var(--navy);margin:3px 0;}
.frac-den{font-size:1.8rem;color:var(--purple);line-height:1;}
.frac-label{font-size:.72rem;font-weight:800;color:#888;margin-top:6px;}

/* NUMBER LINE */
.number-line-wrap{margin:16px 0;overflow-x:auto;}
.number-line{position:relative;height:60px;min-width:340px;}
.nl-track{position:absolute;top:50%;left:20px;right:20px;height:4px;background:#E0E0E0;border-radius:2px;transform:translateY(-50%);}
.nl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:16px;height:16px;border-radius:50%;background:var(--sky);border:3px solid white;box-shadow:0 2px 8px rgba(79,172,254,.5);}
.nl-label{position:absolute;top:60%;transform:translateX(-50%);font-size:.7rem;font-weight:800;color:#888;margin-top:4px;}
.nl-highlight{position:absolute;top:50%;height:4px;background:linear-gradient(90deg,var(--sky),var(--purple));
  border-radius:2px;transform:translateY(-50%);}

/* RULE CARD */
.rule-card{
  background:linear-gradient(135deg,#FFF8E1,#FFF3CD);
  border-radius:16px;padding:16px;border:2px solid var(--sun);
  display:flex;gap:12px;align-items:flex-start;margin:12px 0;
}
.rule-icon{font-size:1.5rem;flex-shrink:0;}
.rule-text{font-size:.9rem;font-weight:700;color:#7C4D00;line-height:1.6;}

/* EXAMPLE BOX */
.example-box{
  background:#F8F9FA;border-radius:16px;padding:16px;border-left:4px solid var(--sky);
  margin:12px 0;
}
.ex-label{font-size:.7rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--sky);margin-bottom:8px;}
.ex-problem{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--navy);margin-bottom:8px;}
.ex-steps{list-style:none;}
.ex-steps li{font-size:.87rem;font-weight:700;color:#555;padding:4px 0;display:flex;gap:8px;align-items:flex-start;}
.step-num{width:20px;height:20px;border-radius:6px;background:var(--sky);color:white;
  font-size:.7rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}

/* ── PRACTICE PANEL ── */
.practice-area{max-width:680px;margin:0 auto;}
.q-card{
  background:white;border-radius:24px;padding:28px;
  box-shadow:var(--shadow);margin-bottom:16px;
  border:3px solid #E8F0FF;
}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.q-num{font-family:'Fredoka One',cursive;font-size:.9rem;color:#999;}
.q-pts{background:linear-gradient(135deg,var(--sun),var(--orange));color:var(--navy);
  padding:4px 12px;border-radius:20px;font-weight:900;font-size:.8rem;}
.q-text{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--navy);margin-bottom:20px;line-height:1.4;}

/* FRACTION INPUT */
.frac-input-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.frac-input-box{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:#F8F9FA;border-radius:16px;padding:16px 20px;border:2px solid #E0E0E0;
}
.frac-input-box input{
  width:60px;height:44px;border:2px solid #E0E0E0;border-radius:10px;
  font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--navy);
  text-align:center;outline:none;transition:all .2s;
}
.frac-input-box input:focus{border-color:var(--sky);background:#F0F9FF;}
.frac-input-bar{width:60px;height:3px;background:var(--navy);border-radius:2px;}
.frac-op{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--navy);}

/* MCQ OPTIONS */
.mcq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.mcq-opt{
  padding:14px 16px;border-radius:16px;border:3px solid #E8E8E8;
  background:white;font-family:'Fredoka One',cursive;font-size:1.1rem;
  cursor:pointer;transition:all .2s;color:var(--navy);text-align:center;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.mcq-opt:hover:not(.disabled){border-color:var(--sky);background:#F0F9FF;transform:scale(1.02);}
.mcq-opt.correct{border-color:var(--green);background:#F0FFF4;color:var(--green);}
.mcq-opt.wrong{border-color:var(--red);background:#FFF5F5;color:var(--red);}
.mcq-opt.disabled{cursor:not-allowed;}
.opt-key{width:26px;height:26px;border-radius:8px;background:#F0F0F0;
  display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;flex-shrink:0;}
.mcq-opt.correct .opt-key{background:var(--green);color:white;}
.mcq-opt.wrong .opt-key{background:var(--red);color:white;}

/* VISUAL MCQ (pizza selector) */
.visual-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.visual-opt{
  padding:10px;border-radius:16px;border:3px solid #E8E8E8;
  background:white;cursor:pointer;transition:all .2s;text-align:center;
}
.visual-opt:hover:not(.disabled){border-color:var(--sky);transform:scale(1.05);}
.visual-opt.correct{border-color:var(--green);background:#F0FFF4;}
.visual-opt.wrong{border-color:var(--red);background:#FFF5F5;}
.visual-opt svg{width:60px;height:60px;display:block;margin:0 auto 4px;}
.visual-opt-label{font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--navy);}

/* SUBMIT / FEEDBACK */
.submit-btn{
  width:100%;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--sky),var(--purple));color:white;
  font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 16px rgba(79,172,254,.4);
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,172,254,.5);}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.feedback-box{
  border-radius:16px;padding:16px;margin-top:12px;
  display:flex;gap:12px;align-items:flex-start;animation:popIn .3s ease;
}
.feedback-box.correct-fb{background:#F0FFF4;border:2px solid var(--green);}
.feedback-box.wrong-fb{background:#FFF5F5;border:2px solid var(--red);}
.fb-icon{font-size:1.5rem;flex-shrink:0;}
.fb-title{font-family:'Fredoka One',cursive;font-size:1rem;margin-bottom:4px;}
.fb-title.c{color:var(--green);}
.fb-title.w{color:var(--red);}
.fb-text{font-size:.84rem;font-weight:700;color:#555;line-height:1.55;}

.next-btn{
  width:100%;padding:13px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--green),var(--teal));color:white;
  font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;
  transition:all .2s;margin-top:10px;display:none;
  box-shadow:0 4px 16px rgba(81,207,102,.4);
}
.next-btn:hover{transform:translateY(-2px);}
.next-btn.show{display:block;}

/* SCORE SCREEN */
.score-screen{
  background:white;border-radius:28px;padding:40px;text-align:center;
  box-shadow:var(--shadow);
}
.score-emoji{font-size:4rem;margin-bottom:12px;animation:bounce 1s infinite alternate;}
.score-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--navy);margin-bottom:8px;}
.score-val{font-family:'Fredoka One',cursive;font-size:3.5rem;background:linear-gradient(135deg,var(--sky),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;}
.score-stars{font-size:2rem;margin-bottom:20px;letter-spacing:4px;}
.retry-btn{
  padding:13px 32px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--sky),var(--purple));color:white;
  font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 16px rgba(79,172,254,.4);
}
.retry-btn:hover{transform:translateY(-2px);}

/* GAME PANEL */
.game-area{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.game-card{
  background:white;border-radius:24px;padding:22px;
  box-shadow:var(--shadow);border:3px solid #E8F0FF;
  cursor:pointer;transition:all .2s;text-align:center;
}
.game-card:hover{border-color:var(--sky);transform:translateY(-3px);}
.game-card-emoji{font-size:2.5rem;margin-bottom:8px;}
.game-card-title{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--navy);margin-bottom:4px;}
.game-card-desc{font-size:.78rem;color:#888;font-weight:700;}
.game-badge{background:linear-gradient(135deg,var(--green),var(--teal));color:white;
  font-size:.65rem;font-weight:900;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:6px;}

/* FRACTION BUILDER GAME */
.builder-game{background:white;border-radius:24px;padding:24px;box-shadow:var(--shadow);}
.builder-title{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--navy);margin-bottom:16px;text-align:center;}
.builder-target{
  background:linear-gradient(135deg,#F0F9FF,#E8F4FF);border-radius:16px;
  padding:20px;text-align:center;margin-bottom:20px;border:2px solid #BFDBFE;
}
.builder-target-label{font-size:.75rem;font-weight:900;text-transform:uppercase;color:#888;margin-bottom:8px;}
.builder-pizza-wrap{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:16px 0;}
.builder-pizza{width:90px;height:90px;cursor:pointer;transition:transform .2s;}
.builder-pizza:hover{transform:scale(1.1);}
.builder-pizza.selected{filter:drop-shadow(0 0 8px rgba(79,172,254,.6));}
.builder-submit{
  width:100%;padding:12px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--orange),var(--sun));color:var(--navy);
  font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;
  transition:all .2s;font-weight:900;
}
.builder-submit:hover{transform:translateY(-2px);}

/* MATCHING GAME */
.matching-game{background:white;border-radius:24px;padding:24px;box-shadow:var(--shadow);}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
.match-col{display:flex;flex-direction:column;gap:8px;}
.match-item{
  padding:12px 16px;border-radius:14px;border:3px solid #E8E8E8;
  background:white;cursor:pointer;transition:all .2s;
  font-family:'Fredoka One',cursive;font-size:1rem;color:var(--navy);text-align:center;
}
.match-item:hover:not(.matched):not(.selected){border-color:var(--sky);}
.match-item.selected{border-color:var(--purple);background:#F5F0FF;}
.match-item.matched{border-color:var(--green);background:#F0FFF4;cursor:default;}
.match-item.wrong-match{border-color:var(--red);background:#FFF5F5;animation:shake .3s;}

/* ANIMATIONS */
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes star-burst{0%{transform:scale(0) rotate(0deg);opacity:1}100%{transform:scale(2) rotate(180deg);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.float{animation:float 3s ease-in-out infinite;}

/* CONFETTI */
.confetti-piece{
  position:fixed;width:10px;height:10px;border-radius:2px;
  pointer-events:none;z-index:9999;
  animation:confetti-fall 1.5s ease-out forwards;
}
@keyframes confetti-fall{
  0%{opacity:1;transform:translateY(-20px) rotate(0deg);}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg);}
}

/* TOOLTIP */
.tooltip{
  position:relative;display:inline-block;
}
.tooltip-text{
  visibility:hidden;background:var(--navy);color:white;
  font-size:.75rem;font-weight:700;padding:6px 10px;border-radius:8px;
  position:absolute;bottom:110%;left:50%;transform:translateX(-50%);
  white-space:nowrap;z-index:100;opacity:0;transition:opacity .2s;
}
.tooltip:hover .tooltip-text{visibility:visible;opacity:1;}

@media(max-width:768px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .mcq-grid{grid-template-columns:1fr;}
  .visual-grid{grid-template-columns:repeat(2,1fr);}
  .game-area{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">ELABoost <span class="logo-badge">MATH</span></div>
  <div class="nav-xp">
    <span class="stars-count" id="starCount">⭐ 0</span>
    <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <span class="xp-txt" id="xpTxt">0 XP</span>
  </div>
</nav>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-title">🧮 Grade 5 Fractions</div>

    <button class="lesson-btn active" onclick="loadLesson('what',this)">
      <div class="lb-emoji">🍕</div>
      <div class="lb-info"><span class="lb-name">What is a Fraction?</span><span class="lb-std">5.NF.A.1</span></div>
    </button>
    <button class="lesson-btn" onclick="loadLesson('equivalent',this)">
      <div class="lb-emoji">⚖️</div>
      <div class="lb-info"><span class="lb-name">Equivalent Fractions</span><span class="lb-std">5.NF.A.1</span></div>
    </button>
    <button class="lesson-btn" onclick="loadLesson('add',this)">
      <div class="lb-emoji">➕</div>
      <div class="lb-info"><span class="lb-name">Adding Fractions</span><span class="lb-std">5.NF.A.1</span></div>
    </button>
    <button class="lesson-btn" onclick="loadLesson('subtract',this)">
      <div class="lb-emoji">➖</div>
      <div class="lb-info"><span class="lb-name">Subtracting Fractions</span><span class="lb-std">5.NF.A.1</span></div>
    </button>

// ═══════════════════════════════
// SVG HELPERS
// ═══════════════════════════════
function makePizzaSVG(slices, filled, size=80, colors=null) {
  const cx=size/2, cy=size/2, r=size/2-2;
  const fillColor = colors?.fill || '#FF922B';
  const emptyColor = colors?.empty || '#FFE8CC';
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${emptyColor}" stroke="#ccc" stroke-width="1.5"/>`;
  for(let i=0;i<slices;i++){
    const a1=(i/slices)*Math.PI*2 - Math.PI/2;
    const a2=((i+1)/slices)*Math.PI*2 - Math.PI/2;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    if(i<filled){
      svg+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${slices===1?1:0},1 ${x2},${y2} Z" fill="${fillColor}" stroke="white" stroke-width="1.5"/>`;
    }
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x1}" y2="${y1}" stroke="white" stroke-width="1.5"/>`;
  }
  svg+=`</svg>`;
  return svg;
}

function makePizzaSet(items) {
  return `<div class="fraction-visual" style="gap:20px;justify-content:center;">` +
    items.map(item => `
      <div class="pizza-wrap">
        <div class="pizza-label">${item.label}</div>
        <div class="pizza">${makePizzaSVG(item.slices, item.filled)}</div>
      </div>`).join('') + `</div>`;
}

function makeNumberLine(denom, num) {
  const points = [];
  for(let i=0;i<=denom;i++) points.push(i/denom);
  const pct = num/denom;
  return `<div class="number-line-wrap"><div class="number-line">
    <div class="nl-track"></div>
    <div class="nl-highlight" style="left:20px;width:calc(${pct*100}% * (100% - 40px)/100%)"></div>
    ${points.map((p,i)=>`
      <div class="nl-dot" style="left:calc(20px + ${p}*(100% - 40px))"></div>
      <div class="nl-label" style="left:calc(20px + ${p}*(100% - 40px));top:68%">
        ${i===0?'0':i===denom?'1':`${i}/${denom}`}
      </div>`).join('')}
  </div></div>`;
}

function renderQuestion() {
  const L = LESSONS[currentLesson];
  const pc = document.getElementById('practiceContent');
  if(!pc) return;

  if(practiceState.idx >= L.questions.length) {
    renderScore();
    return;
  }
  const q = L.questions[practiceState.idx];
  practiceState.answered = false;

  let optionsHTML = '';
  if(q.type==='mcq') {
    optionsHTML = `<div class="mcq-grid">${q.opts.map((o,i)=>`
      <div class="mcq-opt" id="opt${i}" onclick="answerMCQ(${i},${q.ans},'${encodeURIComponent(q.exp)}')">
        <div class="opt-key">${['A','B','C','D'][i]}</div>${o}
      </div>`).join('')}</div>`;
  } else if(q.type==='visual') {
    optionsHTML = `<div class="visual-grid">${q.options.map((o,i)=>`
      <div class="visual-opt" id="opt${i}" onclick="answerVisual(${i},${q.options.findIndex(x=>x.correct)},'${encodeURIComponent(q.exp)}')">
        ${makePizzaSVG(o.slices,o.filled,64)}
        <div class="visual-opt-label">${o.label}</div>
      </div>`).join('')}</div>`;
  }

  pc.innerHTML = `
    <div class="q-card" style="animation:slideUp .3s ease">
      <div class="q-header">
        <div class="q-num">Question ${practiceState.idx+1} of ${L.questions.length}</div>
        <div class="q-pts">⭐ +${q.type==='visual'?15:10} XP</div>
      </div>
      <div class="q-text">${q.text}</div>
      ${optionsHTML}
      <div id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>`;
}

function answerMCQ(sel, ans, expEnc) {
  if(practiceState.answered) return;
  practiceState.answered = true;
  const exp = decodeURIComponent(expEnc);
  document.querySelectorAll('.mcq-opt').forEach(el=>el.classList.add('disabled'));
  document.getElementById(`opt${ans}`).classList.add('correct');
  if(sel!==ans) document.getElementById(`opt${sel}`).classList.add('wrong');
  else { addXP(10); addStar(); spawnConfetti(); }
  showFeedback(sel===ans, exp);
  if(sel===ans) practiceState.score++;
  document.getElementById('nextBtn').classList.add('show');
}

function answerVisual(sel, ans, expEnc) {
  if(practiceState.answered) return;
  practiceState.answered = true;
  const exp = decodeURIComponent(expEnc);
  document.querySelectorAll('.visual-opt').forEach(el=>el.classList.add('disabled'));
  document.getElementById(`opt${ans}`).classList.add('correct');
  if(sel!==ans) document.getElementById(`opt${sel}`).classList.add('wrong');
  else { addXP(15); addStar(); spawnConfetti(); }
  showFeedback(sel===ans, exp);
  if(sel===ans) practiceState.score++;
  document.getElementById('nextBtn').classList.add('show');
}

function showFeedback(correct, exp) {
  const fb = document.getElementById('feedback');
  fb.innerHTML = `
    <div class="feedback-box ${correct?'correct-fb':'wrong-fb'}">
      <div class="fb-icon">${correct?'🎉':'💪'}</div>
      <div>
        <div class="fb-title ${correct?'c':'w'}">${correct?'Excellent! +XP':'Not quite — try again next time!'}</div>
        <div class="fb-text">${exp}</div>
      </div>

}

function nextQuestion() {
  practiceState.idx++;
  renderQuestion();
  // update header progress ring
  const L = LESSONS[currentLesson];
  const progress = Math.round((practiceState.idx / L.questions.length) * 100);

  if(ring){ ring.style.strokeDashoffset = 2*Math.PI*28*(1-progress/100); }
  if(val) val.textContent = progress+'%';
}

function renderScore() {
  const L = LESSONS[currentLesson];

function startMatchingGame() {
  const gc = document.getElementById('gameContainer');
  const pairs = [
    {frac:'1/2', slices:2, filled:1},
    {frac:'3/4', slices:4, filled:3},
    {frac:'2/3', slices:3, filled:2},
    {frac:'1/4', slices:4, filled:1},
  ];
  const shuffledPizzas = [...pairs].sort(()=>Math.random()-.5);
  let selected = null, matched = 0;

  gc.innerHTML = `
    <div class="matching-game">
      <div class="builder-title">🎯 Match the Fraction to the Pizza!</div>
      <div class="match-grid">
        <div class="match-col" id="fracCol">
          ${pairs.map((p,i)=>`<div class="match-item" id="frac${i}" data-idx="${i}" onclick="selectMatch('frac',${i})">${p.frac}</div>`).join('')}
        </div>
        <div class="match-col" id="pizzaCol">
          ${shuffledPizzas.map((p,i)=>`
            <div class="match-item" id="pizza${i}" data-orig="${pairs.findIndex(x=>x.frac===p.frac)}" onclick="selectMatch('pizza',${i})">
              ${makePizzaSVG(p.slices,p.filled,50)}
            </div>`).join('')}
        </div>
      </div>
      <div id="matchFeedback" style="margin-top:12px;text-align:center;font-family:'Fredoka One',cursive;font-size:1.1rem;color:#888;"></div>
    </div>`;

  let fracSel=null, pizzaSel=null;
  window.selectMatch = (type, idx) => {
    if(type==='frac') {
      document.querySelectorAll('#fracCol .match-item:not(.matched)').forEach(el=>el.classList.remove('selected'));
      document.getElementById(`frac${idx}`).classList.add('selected');
      fracSel=idx;
    } else {
      document.querySelectorAll('#pizzaCol .match-item:not(.matched)').forEach(el=>el.classList.remove('selected'));
      document.getElementById(`pizza${idx}`).classList.add('selected');
      pizzaSel=idx;
    }
    if(fracSel!==null && pizzaSel!==null) {
      const pizzaOrig = parseInt(document.getElementById(`pizza${pizzaSel}`).dataset.orig);
      if(fracSel===pizzaOrig) {
        document.getElementById(`frac${fracSel}`).classList.add('matched');
        document.getElementById(`pizza${pizzaSel}`).classList.add('matched');
        addXP(20); spawnConfetti();
        matched++;
        document.getElementById('matchFeedback').innerHTML = `<span style="color:#51CF66">✅ Match! +20 XP</span>`;
        if(matched===pairs.length) {
          document.getElementById('matchFeedback').innerHTML = `<span style="color:#FF922B">🏆 All matched! Amazing job!</span>`;
        }
      } else {
        document.getElementById(`frac${fracSel}`).classList.add('wrong-match');
        document.getElementById(`pizza${pizzaSel}`).classList.add('wrong-match');
        document.getElementById('matchFeedback').innerHTML = `<span style="color:#FF6B6B">❌ Not quite! Try again.</span>`;
        setTimeout(()=>{
          document.getElementById(`frac${fracSel}`).classList.remove('wrong-match','selected');
          document.getElementById(`pizza${pizzaSel}`).classList.remove('wrong-match','selected');
          document.getElementById('matchFeedback').innerHTML='';
        }, 800);
      }
      fracSel=null; pizzaSel=null;
    }
  };
}

function startBuilderGame() {
  const gc = document.getElementById('gameContainer');
  const targets = [{slices:4,filled:3,label:'3/4'},{slices:8,filled:5,label:'5/8'},{slices:6,filled:2,label:'2/6'},{slices:3,filled:2,label:'2/3'}];
  let tIdx=0, selected=0;
  const target = targets[tIdx];

  function renderBuilder() {
    const t = targets[tIdx];
    selected=0;
    gc.innerHTML = `
      <div class="builder-game">
        <div class="builder-title">🍕 Build this fraction: <span style="color:#FF922B">${t.label}</span></div>
        <div class="builder-target">
          <div class="builder-target-label">Target Fraction</div>
          <div class="frac" style="font-family:'Fredoka One',cursive">
            <div style="font-size:2rem;color:#FF922B">${t.filled}</div>
            <div style="width:40px;height:3px;background:#1a1a2e;margin:4px auto"></div>
            <div style="font-size:2rem;color:#9775FA">${t.slices}</div>
          </div>
          <p style="font-size:.8rem;font-weight:700;color:#888;margin-top:8px;">Click ${t.filled} pizza slices to shade them!</p>
        </div>
        <div class="builder-pizza-wrap" id="builderPizzas"></div>
        <div id="builderMsg" style="text-align:center;font-family:'Fredoka One',cursive;font-size:1rem;color:#888;margin-bottom:12px;">
          Selected: 0 / ${t.filled} slices
        </div>
        <button class="builder-submit" onclick="checkBuilder(${t.filled})">Check My Answer! ✓</button>
      </div>`;

    const wrap = document.getElementById('builderPizzas');
    let slicesSelected = new Array(t.slices).fill(false);

    for(let i=0;i<t.slices;i++) {
      const div = document.createElement('div');
      div.style.cssText = 'cursor:pointer;transition:transform .2s;';
      div.innerHTML = makePizzaSVG(t.slices, 0, 70, {fill:'#FF922B',empty:'#FFE8CC'});
      div.onclick = () => {
        slicesSelected[i] = !slicesSelected[i];
        selected = slicesSelected.filter(Boolean).length;
        // Redraw with correct fills
        div.innerHTML = makePizzaSVG(t.slices, 0, 70, {fill: slicesSelected[i]?'#FF922B':'#FFE8CC', empty:'#FFE8CC'});
        div.style.filter = slicesSelected[i] ? 'drop-shadow(0 0 8px rgba(255,146,43,.7))' : '';
        document.getElementById('builderMsg').innerHTML = `Selected: ${selected} / ${t.filled} slices`;
      };
      wrap.appendChild(div);
    }

    window.checkBuilder = (needed) => {
      if(selected===needed) {
        document.getElementById('builderMsg').innerHTML = `<span style="color:#51CF66">🎉 Perfect! That's ${t.label}! +25 XP</span>`;
        addXP(25); spawnConfetti();
        tIdx=(tIdx+1)%targets.length;
        setTimeout(renderBuilder, 1500);
      } else {
        document.getElementById('builderMsg').innerHTML = `<span style="color:#FF6B6B">Not quite! You need exactly ${needed} slices. Try again!</span>`;
      }
    };
  }
  renderBuilder();
}

// ═══════════════════════════════
// XP / STARS / CONFETTI
// ═══════════════════════════════
function addXP(amount) {
  xp += amount;
  const pct = Math.min(100, (xp%200)/2);
  document.getElementById('xpFill').style.width = pct+'%';
  document.getElementById('xpTxt').textContent = xp+' XP';
}

function addStar() {
  stars++;
  document.getElementById('starCount').textContent = '⭐ '+stars;
  document.getElementById('sidebarStars').textContent = '⭐ '+stars;
}

function spawnConfetti() {
  const colors=['#4FACFE','#FFD43B','#51CF66','#FF6B6B','#9775FA','#FF922B'];
  for(let i=0;i<20;i++) {
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`
      left:${Math.random()*100}vw;
      top:${Math.random()*30+20}vh;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${Math.random()*10+6}px;height:${Math.random()*10+6}px;
      border-radius:${Math.random()>0.5?'50%':'3px'};
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${Math.random()*0.8+1}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}
